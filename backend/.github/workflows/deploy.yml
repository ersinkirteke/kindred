name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate

      - name: Build application
        working-directory: backend
        run: npm run build

      - name: Run database migrations
        working-directory: backend
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}

      - name: Deploy to staging
        working-directory: backend
        run: |
          # TODO: Add deployment commands once hosting platform is selected
          # Options under consideration: Railway, Fly.io, or Google Cloud Run
          # Deployment steps will include:
          # 1. Build and push Docker image to registry
          # 2. Deploy to staging environment
          # 3. Run health checks
          echo "Staging deployment placeholder - hosting platform TBD"
          echo "Platform will be chosen based on scraping workload analysis"

  deploy-production:
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate

      - name: Build application
        working-directory: backend
        run: npm run build

      - name: Run database migrations
        working-directory: backend
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}

      - name: Deploy to production
        working-directory: backend
        run: |
          # TODO: Add deployment commands once hosting platform is selected
          # Options under consideration: Railway, Fly.io, or Google Cloud Run
          # Deployment steps will include:
          # 1. Build and push Docker image to registry
          # 2. Deploy to production environment with zero-downtime strategy
          # 3. Run health checks and smoke tests
          # 4. Rollback on failure
          echo "Production deployment placeholder - hosting platform TBD"
          echo "Platform will be chosen based on scraping workload analysis"
