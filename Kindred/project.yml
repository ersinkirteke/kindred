name: Kindred
options:
  bundleIdPrefix: com.kindred
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.3"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: ""

packages:
  ComposableArchitecture:
    url: https://github.com/pointfreeco/swift-composable-architecture
    from: "1.0.0"
  firebase-ios-sdk:
    url: https://github.com/firebase/firebase-ios-sdk
    from: "11.0.0"
  Kingfisher:
    url: https://github.com/onevcat/Kingfisher
    from: "8.0.0"
  apollo-ios:
    url: https://github.com/apollographql/apollo-ios
    from: "2.0.6"
  clerk-ios:
    url: https://github.com/clerk/clerk-ios
    from: "1.0.0"
  swift-dependencies:
    url: https://github.com/pointfreeco/swift-dependencies
    from: "1.0.0"
  DesignSystem:
    path: Packages/DesignSystem
  NetworkClient:
    path: Packages/NetworkClient
  AuthClient:
    path: Packages/AuthClient
  FeedFeature:
    path: Packages/FeedFeature
  ProfileFeature:
    path: Packages/ProfileFeature
  KindredAPI:
    path: Packages/KindredAPI

targets:
  Kindred:
    type: application
    platform: iOS
    sources:
      - path: Sources
    dependencies:
      - package: ComposableArchitecture
      - package: Kingfisher
      - package: firebase-ios-sdk
        product: FirebaseAnalytics
      - package: DesignSystem
      - package: NetworkClient
      - package: AuthClient
      - package: FeedFeature
      - package: ProfileFeature
    settings:
      base:
        INFOPLIST_FILE: Sources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.kindred.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
