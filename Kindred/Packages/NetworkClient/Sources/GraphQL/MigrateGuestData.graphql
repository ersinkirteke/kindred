# Guest data migration mutation
# NOTE: This mutation must be added to backend/schema.gql before codegen will generate types.
# Expected backend implementation: idempotent (guestUserId as dedup key), all-or-nothing atomic.
# When backend adds the mutation, run: ./apollo-ios-cli generate
mutation MigrateGuestData(
  $guestUserId: String!
  $bookmarks: [String!]!
  $skips: [String!]!
  $dietaryPreferences: [String!]!
  $city: String
) {
  migrateGuestData(input: {
    guestUserId: $guestUserId
    bookmarks: $bookmarks
    skips: $skips
    dietaryPreferences: $dietaryPreferences
    city: $city
  }) {
    migratedBookmarks
    migratedSkips
    bookmarks {
      id
      recipeId
      recipeName
      imageUrl
      createdAt
    }
  }
}
