query VoiceProfiles {
  myVoiceProfiles {
    id
    status
    speakerName
    relationship
    createdAt
    updatedAt
  }
}

query NarrationUrl($recipeId: String!, $voiceProfileId: String, $locale: String) {
  narrationUrl(recipeId: $recipeId, voiceProfileId: $voiceProfileId, locale: $locale) {
    url
    speakerName
    relationship
    recipeName
    durationMs
  }
}

mutation DeleteVoiceProfile($id: String!) {
  deleteVoiceProfile(id: $id) {
    id
    status
  }
}

mutation PrewarmNarration($recipeId: String!, $voiceProfileId: String!, $locale: String) {
  prewarmNarration(recipeId: $recipeId, voiceProfileId: $voiceProfileId, locale: $locale)
}
