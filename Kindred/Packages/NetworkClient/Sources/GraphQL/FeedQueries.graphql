query PopularRecipes($first: Int, $after: String) {
  popularRecipes(first: $first, after: $after) {
    edges {
      node {
        id
        name
        description
        prepTime
        cookTime
        calories
        imageUrl
        imageStatus
        popularityScore
        engagementLoves
        dietaryTags
        difficulty
        cuisineType
        ingredients {
          name
          quantity
          unit
          orderIndex
        }
      }
      cursor
    }
    pageInfo {
      hasNextPage
      endCursor
    }
    totalCount
  }
}

query ViralRecipes($location: String!) {
  viralRecipes(location: $location) {
    id
    name
    description
    prepTime
    cookTime
    calories
    imageUrl
    imageStatus
    location
    isViral
    engagementLoves
    engagementBookmarks
    dietaryTags
    difficulty
    cuisineType
    ingredients {
      name
      quantity
      unit
      orderIndex
    }
  }
}

query Recipes($location: String, $limit: Int, $offset: Int) {
  recipes(location: $location, limit: $limit, offset: $offset) {
    id
    name
    description
    prepTime
    cookTime
    calories
    imageUrl
    imageStatus
    location
    isViral
    engagementLoves
    engagementBookmarks
    dietaryTags
    difficulty
    cuisineType
  }
}

query FeedFiltered($latitude: Float!, $longitude: Float!, $first: Int, $after: String, $filters: FeedFiltersInput, $lastFetchedAt: String) {
  feed(latitude: $latitude, longitude: $longitude, first: $first, after: $after, filters: $filters, lastFetchedAt: $lastFetchedAt) {
    edges {
      node {
        id
        name
        imageUrl
        imageStatus
        prepTime
        calories
        engagementLoves
        engagementHumanized
        isViral
        cuisineType
        mealType
        velocityScore
        distanceMiles
      }
      cursor
    }
    pageInfo {
      hasNextPage
      endCursor
    }
    totalCount
    newSinceLastFetch
  }
}
