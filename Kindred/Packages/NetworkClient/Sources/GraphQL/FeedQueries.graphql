query ViralRecipes($location: String!) {
  viralRecipes(location: $location) {
    id
    name
    description
    prepTime
    cookTime
    calories
    imageUrl
    imageStatus
    location
    isViral
    engagementLoves
    engagementBookmarks
    dietaryTags
    difficulty
    ingredients {
      name
      quantity
      unit
      orderIndex
    }
  }
}

query Recipes($location: String, $limit: Int, $offset: Int) {
  recipes(location: $location, limit: $limit, offset: $offset) {
    id
    name
    description
    prepTime
    cookTime
    calories
    imageUrl
    imageStatus
    location
    isViral
    engagementLoves
    engagementBookmarks
    dietaryTags
    difficulty
  }
}
